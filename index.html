<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preescoludi</title>
  <link rel="icon" href="assets/images/cabezabuho.png" type="image/x-icon">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&family=Nunito:wght@400;700&display=swap"
    rel="stylesheet">
</head>

<body>
  <!-- Hero Banner -->
  <section class="container hero-banner text-center position-relative mb-4">
    <img src="assets/images/titulo.png" alt="Preescol" class="hero-title-img">
  </section>


  <!-- Tarjetas de Temas Educativos -->
  <section class="container mb-5" id="temas">
    <div class="row g-4 justify-content-center">
      <div class="col-12 col-md-6 col-lg-4 d-flex flex-column align-items-center gap-4">
        <!-- Vocales -->
        <div class="col-12 col-sm-7 col-lg-7">
          <div class="card-edu text-center" data-audio="assets/audio/vocales.ogg">
            <div class="mb-2"><span class="badge bg-danger fs-5">a e i o u</span></div>
            <h3 class="mb-2">Vocales</h3>
            <a class="btn btn-edu btn-juego" href="vocales.html">¡Aprende y Juega!</a>
          </div>
        </div>
        <!-- Letras -->
        <div class="col-12 col-sm-7 col-lg-7">
          <div class="card-edu text-center" data-audio="assets/audio/letras.ogg">
            <div class="mb-2"><span class="badge bg-primary fs-5">b, l, m, n... </span></div>
            <h3 class="mb-2">Letras</h3>
            <a class="btn btn-edu btn-juego" href="letras.html">¡Aprende y Juega!</a>
          </div>
        </div>
      </div>
      <!--Buho-->
      <div class="col-12 col-md-6 col-lg-4 d-flex flex-column align-items-center gap-4 video-container">
        <video class="video-buho" controls poster="assets/images/buho1.png">
          <source src="assets/videos/Videobuho1.mp4" type="video/mp4">
        </video>
      </div>
      <div class="col-12 col-md-6 col-lg-4 d-flex flex-column align-items-center gap-4">

        <!-- Números -->
        <div class="col-12 col-sm-7 col-lg-7">
          <div class="card-edu text-center" data-audio="assets/audio/numeros.ogg">
            <div class="mb-2"><span class="badge bg-success fs-5">1 2 3 <span style="font-family: var(--font-banner); font-weight: 550;">4</span>...</span></div>
            <h3 class="mb-2">Números Y Sus Familias </h3>
            <a class="btn btn-edu btn-juego" href="numeros.html">¡Aprende y Juega!</a>
          </div>
        </div>
        <!-- Colores -->
        <div class="col-12 col-sm-7 col-lg-7">
          <div class="card-edu text-center" data-audio="assets/audio/colores.ogg">
            <div class="mb-2">
              <span class="badge bg-danger" style="background:#ff5252;">&nbsp;</span>
              <span class="badge bg-warning" style="background:#ffd600;">&nbsp;</span>
              <span class="badge bg-info" style="background:#29b6f6;">&nbsp;</span>
            </div>
            <h3 class="mb-2">Colores</h3>
            <a class="btn btn-edu btn-juego" href="colores.html">¡Aprende y Juega!</a>
          </div>
        </div>

      </div>
    </div>
    <div class="row justify-content-center mt-4">
      <!-- Figuras geométricas -->
      <div class="col-12 col-sm-6 col-lg-4">
        <div class="card-edu text-center" data-audio="assets/audio/figuras.ogg">
          <div class="mb-2">
            <span class="badge bg-warning fs-4" style="background:#ffd600; ">𒊹</span>
            <span class="badge bg-info fs-4" style="background:#29b6f6;">⬜</span>
            <span class="badge bg-danger fs-4" style="background:#ff4081; font-family:var(--font-banner);"> ▲</span>
            <span class="badge bg-success fs-4" style="background:#4CAF50; font-family:var(--font-banner);">▊</span>
          </div>
          <h3 class="mb-2">Figuras geométricas</h3>
          <a class="btn btn-edu btn-juego" href="figuras.html">¡Aprende y Juega!</a>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="text-center py-3"
    style="background:#fff; border-radius:var(--radius-lg) var(--radius-lg) 0 0; box-shadow:var(--shadow-sm);">
    <span style="font-family:var(--font-title); color:var(--color-accent);">Desarrollado por @SkahnowTech<span
        style="color:var(--color-primary);"> ♥</span></span>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
  <script src="js/owl.js"></script>
</body>

</html>
